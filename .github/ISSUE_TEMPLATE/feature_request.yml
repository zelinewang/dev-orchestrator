name: Feature request
description: Suggest an improvement to the /dev orchestrator
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What part of the investigate → plan → TDD → verify → ship loop is friction today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like. If it adds enforcement, note whether it belongs in a hook (deterministic) or the skill (guidance).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
